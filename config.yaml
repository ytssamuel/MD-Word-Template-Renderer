# MD-Word Template Renderer - 設定檔範例
# 複製此檔案為 config.yaml 並修改設定

# 預設模板路徑
template: templates/default.docx

# 輸出目錄
output_dir: output/

# Markdown 解析設定
parsing:
  indent_size: 4
  allow_mixed_indent: false
  encoding: utf-8

# 渲染設定
rendering:
  show_errors: true
  error_format: "[ERROR: 變數 '{var}' 不存在]"
  preserve_styles: true

# 驗證設定
validation:
  enabled: false
  schema_path: null
  strict_mode: false

# 批次處理設定
batch:
  show_progress: true
  continue_on_error: true
  output_pattern: "{name}.docx"

# Excel 渲染設定（v2.2 新增；v2.2.1 補 template_engine 段）
excel:
  default_template: templates/excel/sample_template.xlsx
  list_sheet_naming: "{key}"
  header_sheet:
    enabled: true
    name: "基本資訊"
  extra_columns:
    - source_field
    - path
    - depth
  image:
    max_width_px: 480
    max_height_px: 360
  auto_fit_columns: true
  template_engine:
    enabled: true
    auto_flatten_lists: true
    missing_variable: "silent"
    error_format: "[ERROR: 變數 '{var}' 不存在]"

# 日誌設定
logging:
  level: INFO
  file_output: false
  log_file: logs/renderer.log
